[config]
# Matugen strictly requires this block to exist at the top.
reload_apps = false

[templates.quickshell]
# If the tilde (~) ever gives you trouble, replace it with /home/yourusername/
input_path = "~/.config/hypr/scripts/quickshell/colors.json.template"
output_path = "/tmp/qs_colors.json"

[templates.firefox]
input_path = "~/.config/matugen/templates/firefox.css"
output_path = "~/.config/firefox-matugen.css"

[templates.waybar]
input_path = "~/.config/matugen/templates/waybar.css"
output_path = "~/.config/waybar-matugen.css"

[templates.rofi]
input_path = "~/.config/matugen/templates/rofi.rasi"
output_path = "~/.config/rofi/matugen.rasi"

[templates.hyprland]
input_path = "~/.config/matugen/templates/hyprland-colors.conf"
output_path = "~/.config/hypr/matugen-colors.conf"

